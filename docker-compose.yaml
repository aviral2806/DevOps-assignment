version: '3.8'

services:
  backend:
    image: aviral2806/fastapi-backend:latest
    container_name: backend
    ports:
      - "8000:8000"
    restart: always

  frontend:
    image: aviral2806/nextts-frontend:latest
    container_name: frontend
    ports:
      - "3000:3000"
    restart: always
    environment:
      - FASTAPI_BASE_URL=http://backend:8000
